<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0c2341"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="frost" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <circle cx="400" cy="260" r="180" fill="#06b6d4" opacity="0.05" filter="url(#softglow2)"/>
  <!-- Frost pattern dots -->
  <circle cx="150" cy="120" r="2" fill="#67e8f9" opacity="0.15"/>
  <circle cx="650" cy="160" r="1.5" fill="#67e8f9" opacity="0.12"/>
  <circle cx="100" cy="400" r="1" fill="#67e8f9" opacity="0.1"/>
  <circle cx="700" cy="380" r="2.5" fill="#67e8f9" opacity="0.13"/>
  <circle cx="250" cy="500" r="1.5" fill="#67e8f9" opacity="0.08"/>
  <circle cx="550" cy="100" r="2" fill="#67e8f9" opacity="0.1"/>
  <circle cx="180" cy="280" r="1" fill="#67e8f9" opacity="0.12"/>
  <circle cx="620" cy="460" r="1.5" fill="#67e8f9" opacity="0.09"/>
  <!-- Freezer box shape -->
  <rect x="300" y="140" width="200" height="260" rx="16" fill="none" stroke="url(#ice)" stroke-width="2.5" filter="url(#glow2)"/>
  <rect x="300" y="140" width="200" height="260" rx="16" fill="#67e8f908"/>
  <!-- Freezer door divider -->
  <line x1="310" y1="270" x2="490" y2="270" stroke="#67e8f9" stroke-width="1.5" opacity="0.4"/>
  <!-- Door handles -->
  <rect x="478" y="215" width="6" height="30" rx="3" fill="#67e8f9" opacity="0.5"/>
  <rect x="478" y="290" width="6" height="30" rx="3" fill="#67e8f9" opacity="0.5"/>
  <!-- Cold vapor wisps -->
  <path d="M340 170 Q360 180 340 190 Q320 200 340 210" fill="none" stroke="#a5f3fc" stroke-width="1.5" opacity="0.25"/>
  <path d="M380 175 Q400 185 380 195 Q360 205 380 215" fill="none" stroke="#a5f3fc" stroke-width="1.5" opacity="0.2"/>
  <path d="M420 168 Q440 178 420 188 Q400 198 420 208" fill="none" stroke="#a5f3fc" stroke-width="1.5" opacity="0.18"/>
  <!-- Items inside top compartment -->
  <rect x="320" y="180" width="35" height="25" rx="5" fill="#06b6d4" opacity="0.15" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <rect x="365" y="175" width="30" height="30" rx="5" fill="#0891b2" opacity="0.15" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <rect x="405" y="182" width="40" height="22" rx="5" fill="#06b6d4" opacity="0.12" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <!-- Items inside bottom compartment -->
  <rect x="325" y="295" width="40" height="30" rx="6" fill="#06b6d4" opacity="0.15" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <rect x="375" y="290" width="35" height="35" rx="6" fill="#0891b2" opacity="0.15" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <rect x="420" y="298" width="45" height="27" rx="6" fill="#06b6d4" opacity="0.12" stroke="#67e8f9" stroke-width="0.8" opacity="0.25"/>
  <!-- Temperature circle -->
  <circle cx="400" cy="440" r="24" fill="none" stroke="url(#frost)" stroke-width="2" filter="url(#glow2)"/>
  <text x="400" y="447" font-family="system-ui, sans-serif" font-size="16" fill="#67e8f9" text-anchor="middle" font-weight="700">-18°</text>
  <!-- Title -->
  <text x="400" y="500" font-family="system-ui, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="2">Freezely</text>
  <text x="400" y="530" font-family="system-ui, sans-serif" font-size="14" fill="#67e8f999" text-anchor="middle" font-weight="400" letter-spacing="2">SMART FREEZER TRACKER</text>
</svg>