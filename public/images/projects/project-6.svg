  <text x="400" y="520" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" opacity="0.6" letter-spacing="3">NEXT.JS &#183; TAILWIND &#183; GITHUB PAGES</text>
