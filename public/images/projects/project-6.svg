<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="code6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow6"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    <filter id="softbg6"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg6)"/>
  <ellipse cx="400" cy="260" rx="200" ry="150" fill="#06b6d4" opacity="0.05" filter="url(#softbg6)"/>
  <!-- Browser window frame -->
  <rect x="150" y="95" width="500" height="330" rx="12" fill="#0a1428" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Browser top bar -->
