  <rect x="305" y="220" width="164" height="6" rx="3" fill="#06b6d4" opacity="0.4"/>
  <rect x="330" y="234" width="114" height="4" rx="2" fill="#ffffff" opacity="0.1"/>
  <!-- CTA buttons -->
  <rect x="320" y="248" width="70" height="20" rx="10" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="0.8"/>
  <rect x="400" y="248" width="80" height="20" rx="10" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <!-- Card row -->
  <rect x="175" y="285" width="130" height="80" rx="6" fill="#0f2040" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <rect x="320" y="285" width="130" height="80" rx="6" fill="#0f2040" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <rect x="465" y="285" width="130" height="80" rx="6" fill="#0f2040" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <!-- Card content lines -->
  <rect x="185" y="298" width="50" height="5" rx="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="185" y="310" width="100" height="3" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="185" y="318" width="85" height="3" rx="1" fill="#ffffff" opacity="0.1"/>
  <rect x="330" y="298" width="50" height="5" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="330" y="310" width="100" height="3" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="330" y="318" width="85" height="3" rx="1" fill="#ffffff" opacity="0.1"/>
  <rect x="475" y="298" width="50" height="5" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <rect x="475" y="310" width="100" height="3" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="475" y="318" width="85" height="3" rx="1" fill="#ffffff" opacity="0.1"/>
  <!-- Decorative code symbols floating -->
  <text x="100" y="180" font-family="monospace" font-size="18" fill="#22d3ee" opacity="0.15">&lt;/&gt;</text>
  <text x="660" y="220" font-family="monospace" font-size="14" fill="#3b82f6" opacity="0.12">{ }</text>
  <text x="95" y="360" font-family="monospace" font-size="12" fill="#8b5cf6" opacity="0.12">npm</text>
  <text x="660" y="380" font-family="monospace" font-size="13" fill="#22d3ee" opacity="0.12">tsx</text>
