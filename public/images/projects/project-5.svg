    <filter id="glow5"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    <filter id="softbg5"><feGaussianBlur stdDeviation="28"/></filter>
