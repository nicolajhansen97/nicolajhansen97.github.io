<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#2e1a0a"/>
    </linearGradient>
    <linearGradient id="rope" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow4">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg4)"/>
  <circle cx="400" cy="250" r="160" fill="#7c3aed" opacity="0.04" filter="url(#softglow4)"/>
  <!-- Gallows structure -->
  <g filter="url(#glow4)">
    <!-- Base -->
    <line x1="250" y1="400" x2="400" y2="400" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <!-- Vertical pole -->
    <line x1="310" y1="400" x2="310" y2="130" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <!-- Top beam -->
    <line x1="310" y1="130" x2="430" y2="130" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <!-- Rope -->
    <line x1="430" y1="130" x2="430" y2="170" stroke="url(#rope)" stroke-width="2" stroke-linecap="round"/>
    <!-- Support brace -->
    <line x1="310" y1="170" x2="350" y2="130" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Stick figure (partially drawn for suspense) -->
  <g opacity="0.7">
    <!-- Head -->
    <circle cx="430" cy="195" r="22" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <!-- Body -->
    <line x1="430" y1="217" x2="430" y2="290" stroke="#c084fc" stroke-width="2.5"/>
    <!-- Left arm -->
    <line x1="430" y1="245" x2="400" y2="275" stroke="#c084fc" stroke-width="2.5"/>
    <!-- Right arm -->
    <line x1="430" y1="245" x2="460" y2="275" stroke="#c084fc" stroke-width="2.5"/>
    <!-- Left leg -->
    <line x1="430" y1="290" x2="405" y2="335" stroke="#c084fc" stroke-width="2.5"/>
    <!-- Right leg (missing — suspense!) -->
  </g>
  <!-- Letter boxes -->
  <g transform="translate(250, 430)">
    <rect x="0" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="19" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc" text-anchor="middle" font-weight="600">H</text>

    <rect x="50" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="69" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc" text-anchor="middle" font-weight="600">A</text>

    <rect x="100" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="119" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc" text-anchor="middle" font-weight="600">N</text>

    <rect x="150" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="169" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc" text-anchor="middle" font-weight="600">G</text>

    <rect x="200" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <text x="219" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc40" text-anchor="middle" font-weight="600">_</text>

    <rect x="250" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="269" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc" text-anchor="middle" font-weight="600">A</text>

    <rect x="300" y="0" width="38" height="45" rx="6" fill="#7c3aed10" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <text x="319" y="32" font-family="system-ui, sans-serif" font-size="22" fill="#c084fc40" text-anchor="middle" font-weight="600">_</text>
  </g>
  <!-- Wrong letters -->
  <text x="560" y="200" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" opacity="0.4">X Z Q</text>
  <!-- Title -->
  <text x="400" y="530" font-family="system-ui, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="1">Hangman Classic</text>
  <text x="400" y="560" font-family="system-ui, sans-serif" font-size="14" fill="#a78bfa99" text-anchor="middle" font-weight="400" letter-spacing="3">GUESS THE WORD</text>
</svg>