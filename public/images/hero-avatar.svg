<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.6"/>
  <circle cx="150" cy="150" r="138" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.3"/>
  <!-- Inner fill -->
  <circle cx="150" cy="150" r="130" fill="url(#inner)"/>
  <!-- Stylized person -->
  <circle cx="150" cy="110" r="32" fill="#1e293b" stroke="#22d3ee" stroke-width="1.8"/>
  <ellipse cx="150" cy="195" rx="45" ry="35" fill="#1e293b" stroke="#22d3ee" stroke-width="1.8"/>
  <!-- Hair -->
  <path d="M118 100 Q125 72 150 70 Q175 72 182 100" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
  <!-- Eyes -->
  <circle cx="140" cy="108" r="2.5" fill="#22d3ee"/>
  <circle cx="160" cy="108" r="2.5" fill="#22d3ee"/>
  <!-- Smile -->
  <path d="M140 118 Q150 125 160 118" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <!-- Code brackets floating around -->
  <text x="75" y="85" font-family="monospace" font-size="20" fill="#22d3ee" opacity="0.3" filter="url(#glow)">&lt;/&gt;</text>
  <text x="205" y="95" font-family="monospace" font-size="16" fill="#3b82f6" opacity="0.25">{ }</text>
  <text x="85" y="230" font-family="monospace" font-size="14" fill="#3b82f6" opacity="0.2">fn()</text>
  <text x="195" y="220" font-family="monospace" font-size="18" fill="#22d3ee" opacity="0.25">API</text>
  <!-- Decorative dots -->
  <circle cx="70" cy="150" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="230" cy="150" r="2" fill="#3b82f6" opacity="0.2"/>
  <circle cx="150" cy="60" r="1.5" fill="#22d3ee" opacity="0.15"/>
  <circle cx="150" cy="245" r="1.5" fill="#3b82f6" opacity="0.15"/>
</svg>